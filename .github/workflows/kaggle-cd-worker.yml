name: Kaggle CD - scheduled worker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      retry_tag:
        description: Requeue one failed tag before running this tick
        required: false
        type: string

permissions: {}

concurrency:
  group: kaggle-cd-worker
  cancel-in-progress: false

jobs:
  kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      handoff_artifact_id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write
    env:
      KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG || 'signlang-det-training' }}
      KAGGLE_KERNEL_PRIVATE: ${{ vars.KAGGLE_KERNEL_PRIVATE || 'true' }}
      RKNN_TARGET_PLATFORM: ${{ vars.RKNN_TARGET_PLATFORM || 'rk3588' }}
    steps:
      - name: Require the default branch for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          expected_ref="refs/heads/$DEFAULT_BRANCH"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "::error::Run this workflow from $expected_ref, not $GITHUB_REF."
            exit 1
          fi

      - name: Check out repository and tags
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Requeue requested failed tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.retry_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RETRY_TAG: ${{ inputs.retry_tag }}
        run: python .github/scripts/kaggle_cd.py retry --tag "$RETRY_TAG"

      - name: Probe delivery queue
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/kaggle_cd.py probe >> "$GITHUB_OUTPUT"

      - name: Install pinned Kaggle API
        if: ${{ steps.probe.outputs.has_work == 'true' }}
        # v2.2.3 supports the standard kernel-metadata.json machine_shape field.
        # Pin the release commit so accelerator selection cannot change underneath CD.
        run: >-
          python -m pip install --disable-pip-version-check
          "kaggle @ git+https://github.com/Kaggle/kaggle-cli.git@7b31fdb492b2050a2f0eba2f035a0955da0c9305"

      - name: Advance the Kaggle state machine once
        id: tick
        if: ${{ steps.probe.outputs.has_work == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          HANDOFF_DIR: ${{ runner.temp }}/kaggle-handoff
        run: |
          python .github/scripts/kaggle_cd.py tick --handoff-dir "$HANDOFF_DIR"
          if [[ -f "$HANDOFF_DIR/release-state.json" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload completed Kaggle output
        id: upload
        if: ${{ steps.tick.outputs.ready == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kaggle-output-${{ github.run_id }}
          path: ${{ runner.temp }}/kaggle-handoff
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      - name: Mark handoff artifact failure
        if: ${{ failure() && steps.tick.outputs.ready == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HANDOFF_DIR: ${{ runner.temp }}/kaggle-handoff
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: >-
          python .github/scripts/kaggle_cd.py fail-handoff
          --handoff-dir "$HANDOFF_DIR"
          --phase "Kaggle output artifact upload"
          --run-url "$RUN_URL"

  convert:
    needs: kaggle
    if: >-
      ${{ always() && !cancelled() && needs.kaggle.result == 'success' &&
          needs.kaggle.outputs.handoff_artifact_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Install pinned model conversion environment
        run: >-
          python -m pip install --disable-pip-version-check
          "setuptools==79.0.1"
          "numpy==1.26.4"
          "torch==2.4.0"
          "onnx==1.16.1"
          "onnxruntime==1.23.2"
          "rknn-toolkit2==2.3.2"

      - name: Download completed Kaggle output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.kaggle.outputs.handoff_artifact_id }}
          path: ${{ runner.temp }}/kaggle-handoff

      - name: Convert PT model to ONNX and RKNN
        env:
          HANDOFF_DIR: ${{ runner.temp }}/kaggle-handoff
          CONVERTED_DIR: ${{ runner.temp }}/converted-release
        run: >-
          python .github/scripts/kaggle_cd.py convert-handoff
          --handoff-dir "$HANDOFF_DIR"
          --output-dir "$CONVERTED_DIR"

      - name: Upload converted Release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: converted-release-${{ github.run_id }}
          path: ${{ runner.temp }}/converted-release
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  publish:
    needs: convert
    if: ${{ always() && !cancelled() && needs.convert.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download converted Release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: converted-release-${{ github.run_id }}
          path: ${{ runner.temp }}/converted-release

      - name: Upload assets and publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HANDOFF_DIR: ${{ runner.temp }}/converted-release
        run: >-
          python .github/scripts/kaggle_cd.py publish-handoff
          --handoff-dir "$HANDOFF_DIR"

  finalize-failure:
    needs: [kaggle, convert, publish]
    if: >-
      ${{ always() && needs.kaggle.outputs.handoff_artifact_id != '' &&
          (needs.convert.result != 'success' || needs.publish.result != 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download Kaggle handoff metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.kaggle.outputs.handoff_artifact_id }}
          path: ${{ runner.temp }}/kaggle-handoff

      - name: Mark delivery as failed
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HANDOFF_DIR: ${{ runner.temp }}/kaggle-handoff
          CONVERT_RESULT: ${{ needs.convert.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$CONVERT_RESULT" != "success" ]]; then
            phase="Model conversion"
          else
            phase="Release publication"
          fi
          python .github/scripts/kaggle_cd.py fail-handoff \
            --handoff-dir "$HANDOFF_DIR" \
            --phase "$phase" \
            --run-url "$RUN_URL"
