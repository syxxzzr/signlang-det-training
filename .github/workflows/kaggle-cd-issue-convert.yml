name: Kaggle CD - convert Issue uploads

on:
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: kaggle-cd-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  convert:
    if: >-
      ${{ !github.event.issue.pull_request && github.event.issue.locked &&
          startsWith(github.event.issue.title, 'Kaggle output upload · ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: write
      issues: write
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Install pinned model conversion environment
        run: >-
          python -m pip install --disable-pip-version-check
          "setuptools==79.0.1"
          "numpy==1.26.4"
          "protobuf==4.25.4"
          "torch==2.4.0"
          "onnx==1.16.1"
          "onnxruntime==1.23.2"
          "rknn-toolkit2==2.3.2"

      - name: Drain queued Issue uploads in order
        id: drain
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: >-
          python .github/scripts/kaggle_cd.py process-issue
          --issue-number "$ISSUE_NUMBER"
          --github-output "$GITHUB_OUTPUT"

      - name: Start the next queued tag
        if: ${{ steps.drain.outputs.published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: gh workflow run kaggle-cd-submit.yml --ref "$DEFAULT_BRANCH"
