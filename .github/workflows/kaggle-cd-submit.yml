name: Kaggle CD - submit next tag

on:
  workflow_dispatch:
    inputs:
      retry_tag:
        description: Requeue one failed Kaggle submission before running
        required: false
        type: string

permissions: {}

concurrency:
  group: kaggle-cd-submit
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
    env:
      KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG || 'signlang-det-training' }}
      KAGGLE_KERNEL_PRIVATE: ${{ vars.KAGGLE_KERNEL_PRIVATE || 'true' }}
      RKNN_TARGET_PLATFORM: ${{ vars.RKNN_TARGET_PLATFORM || 'rk3588' }}
      PIP_INDEX_URL: https://mirrors.nju.edu.cn/pypi/web/simple
    steps:
      - name: Require the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          expected_ref="refs/heads/$DEFAULT_BRANCH"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "::error::Run this workflow from $expected_ref, not $GITHUB_REF."
            exit 1
          fi

      - name: Check out repository and tags
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Requeue requested failed tag
        if: ${{ inputs.retry_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RETRY_TAG: ${{ inputs.retry_tag }}
        run: python .github/scripts/kaggle_cd.py retry --tag "$RETRY_TAG"

      - name: Probe submission queue
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/kaggle_cd.py probe >> "$GITHUB_OUTPUT"

      - name: Install pinned Kaggle API
        if: ${{ steps.probe.outputs.submit_work == 'true' }}
        # v2.2.3 supports the standard kernel-metadata.json machine_shape field.
        # Pin the release commit so accelerator selection cannot change underneath CD.
        run: >-
          python -m pip install --disable-pip-version-check
          "kaggle @ git+https://github.com/Kaggle/kaggle-cli.git@7b31fdb492b2050a2f0eba2f035a0955da0c9305"

      - name: Submit the next Kaggle notebook
        if: ${{ steps.probe.outputs.submit_work == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python .github/scripts/kaggle_cd.py submit

      - name: Report active manual handoff
        if: >-
          ${{ steps.probe.outputs.has_work == 'true' &&
              steps.probe.outputs.submit_work != 'true' }}
        run: echo "The active tag is waiting for manual output upload in its locked Issue."
