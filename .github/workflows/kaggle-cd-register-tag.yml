name: Kaggle CD - register tag

on:
  push:
    tags:
      - "**"

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Register tagged delivery
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          RELEASE_SHA="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          python .github/scripts/kaggle_cd.py register-tag \
            --tag "$RELEASE_TAG" \
            --sha "$RELEASE_SHA"

      - name: Request immediate Kaggle submission
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: gh workflow run kaggle-cd-submit.yml --ref "$DEFAULT_BRANCH"
