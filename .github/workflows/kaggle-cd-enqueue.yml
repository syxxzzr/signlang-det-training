name: Kaggle CD - enqueue tag

on:
  push:
    tags:
      - "*"

permissions:
  actions: write
  contents: write

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v4

      - name: Enqueue tag as a draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          RELEASE_SHA="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          python .github/scripts/kaggle_cd.py enqueue \
            --tag "$RELEASE_TAG" \
            --sha "$RELEASE_SHA"

      - name: Request an immediate worker tick
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run kaggle-cd-worker.yml \
            --ref "$DEFAULT_BRANCH" || {
              echo "::warning::Immediate worker dispatch failed; the scheduled worker will process the queue."
            }
